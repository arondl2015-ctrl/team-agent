<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DL팀</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="DL팀">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f5f6fa;--bg2:#ffffff;--bg3:#f0f1f7;
  --border:#e2e4ef;--border2:#c8cbdf;
  --text:#1a1d2e;--text2:#5a5f7a;--text3:#9196b0;
  --blue:#4f7cff;--blue2:#c5d3ff;--blue3:#eef1ff;
  --teal:#0f9e6e;--teal2:#9fe0c8;--teal3:#e0f7ef;
  --coral:#e04040;--coral2:#fbb0b0;--coral3:#fde8e8;
  --r:10px;--rl:14px;
}
html,body{height:100%;font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--text);}
body{display:flex;flex-direction:column;overflow:hidden;}

#header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;}
.logo{width:26px;height:26px;background:linear-gradient(135deg,#4f7cff,#0f9e6e);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;}
#app-title{font-size:14px;font-weight:600;margin-left:8px;}
.sync-pill{display:flex;align-items:center;gap:5px;font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid var(--teal2);background:var(--teal3);color:var(--teal);}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--teal);}
.live-dot.pulse{animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}

#body{display:flex;flex:1;overflow:hidden;}
#sidebar{width:200px;border-right:1px solid var(--border);background:var(--bg2);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;transition:left 0.25s;}
#main{flex:1;display:flex;flex-direction:column;min-width:0;}

.sb-label{padding:12px 13px 5px;font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;}
.member{display:flex;align-items:center;gap:8px;padding:6px 13px;font-size:12px;color:var(--text2);}
.av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0;}
.av-0{background:#dde8ff;color:#2a5cd4;}
.av-1{background:#d4f5e9;color:#0a7a52;}
.av-2{background:#fde8e8;color:#b03030;}
.av-3{background:#ede8ff;color:#5030b0;}
.av-4{background:#fff3d4;color:#b07a00;}
.divider{height:1px;background:var(--border);margin:6px 0;}
.ch-top{display:flex;align-items:center;justify-content:space-between;padding:8px 13px 4px;}
.add-btn{width:20px;height:20px;border-radius:5px;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;}
.add-btn:hover{color:var(--blue);border-color:var(--blue);}
.channel{display:flex;align-items:center;gap:7px;padding:7px 13px;cursor:pointer;border-left:2px solid transparent;transition:.15s;}
.channel:hover{background:var(--bg3);}
.channel.active{background:var(--bg3);border-left-color:var(--blue);}
.ch-name{font-size:12px;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.channel.active .ch-name{color:var(--text);font-weight:500;}
.ch-del{font-size:11px;color:var(--text3);cursor:pointer;padding:2px 5px;display:none;}
.channel:hover .ch-del{display:block;}
.ch-del:hover{color:var(--coral);}

#ch-bar{padding:10px 16px;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
#ch-bar-title{font-size:14px;font-weight:600;}
#ch-bar-sub{font-size:11px;color:var(--text3);margin-top:2px;}

#feed{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px;}
#feed::-webkit-scrollbar{width:4px;}
#feed::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

.msg{display:flex;gap:9px;animation:fi .2s ease;}
@keyframes fi{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
.msg-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0;margin-top:1px;}
.msg-r{flex:1;min-width:0;}
.msg-meta{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.msg-name{font-size:12px;font-weight:600;}
.msg-time{font-size:10px;color:var(--text3);margin-left:auto;}
.msg-body{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:9px 12px;font-size:13px;line-height:1.6;color:var(--text);white-space:pre-wrap;word-break:break-word;}
.ai-body{background:var(--blue3);border:1px solid var(--blue2);border-radius:var(--r);padding:9px 12px;font-size:13px;line-height:1.6;color:var(--text);white-space:pre-wrap;word-break:break-word;}
.dots{display:flex;gap:4px;padding:2px 0;}
.dots span{width:5px;height:5px;border-radius:50%;background:var(--blue);animation:db 1.2s infinite;}
.dots span:nth-child(2){animation-delay:.2s;}
.dots span:nth-child(3){animation-delay:.4s;}
@keyframes db{0%,80%,100%{transform:scale(.6);opacity:.4;}40%{transform:scale(1);opacity:1;}}
.empty{text-align:center;padding:60px 20px;color:var(--text3);font-size:13px;line-height:2;}

#input-area{border-top:1px solid var(--border);background:var(--bg2);padding:10px 14px;flex-shrink:0;}
.user-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
#cur-av{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;}
#cur-name{font-size:12px;font-weight:500;color:var(--text2);}
.msg-row{display:flex;gap:7px;margin-bottom:8px;}
#msg-input{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:9px 12px;font-size:13px;color:var(--text);font-family:'Pretendard',sans-serif;resize:none;line-height:1.5;}
#msg-input:focus{outline:none;border-color:var(--blue);}
#msg-input::placeholder{color:var(--text3);}
#send-btn{padding:9px 16px;background:var(--blue);border:none;border-radius:var(--r);color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:'Pretendard',sans-serif;}
#send-btn:hover{opacity:.85;}
.ai-row{display:flex;gap:7px;}
#ai-input{flex:1;background:var(--blue3);border:1px solid var(--blue2);border-radius:var(--r);padding:8px 12px;font-size:13px;color:var(--text);font-family:'Pretendard',sans-serif;}
#ai-input:focus{outline:none;border-color:var(--blue);}
#ai-input::placeholder{color:var(--blue);opacity:.6;}
#ai-btn{padding:8px 14px;background:var(--blue3);border:1px solid var(--blue2);border-radius:var(--r);color:var(--blue);font-size:13px;font-weight:600;cursor:pointer;font-family:'Pretendard',sans-serif;white-space:nowrap;}
#ai-btn:hover{background:var(--blue2);}
#ai-btn:disabled{opacity:.5;cursor:not-allowed;}

/* Modals */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center;}
.overlay.show{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rl);padding:28px;width:340px;max-width:90vw;}
.modal h2{font-size:15px;font-weight:600;margin-bottom:14px;}
.modal p{font-size:12px;color:var(--text2);margin-bottom:14px;line-height:1.6;}
.modal input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:8px 11px;font-size:13px;color:var(--text);font-family:'Pretendard',sans-serif;margin-bottom:10px;}
.modal input:focus{outline:none;border-color:var(--blue);}
.modal-btns{display:flex;gap:8px;margin-top:4px;}
.modal-btns button{flex:1;padding:9px;border-radius:var(--r);border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:13px;cursor:pointer;font-family:'Pretendard',sans-serif;}
.modal-btns .ok{background:var(--blue);border-color:var(--blue);color:#fff;}
.user-btn{display:flex;align-items:center;gap:10px;width:100%;padding:10px 14px;margin-bottom:8px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);color:var(--text);font-size:13px;cursor:pointer;font-family:'Pretendard',sans-serif;}
.user-btn:hover{border-color:var(--blue);}
.err{font-size:11px;color:var(--coral);margin-bottom:8px;display:none;}

/* Mobile */
#menu-btn{display:flex;align-items:center;justify-content:center;width:32px;height:32px;background:transparent;border:1px solid var(--border2);border-radius:var(--r);color:var(--text2);font-size:16px;cursor:pointer;}
#mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:40;}
@media(min-width:601px){#menu-btn{display:none;}}
@media(max-width:600px){
  #sidebar{position:fixed;left:-200px;top:0;height:100%;z-index:50;width:200px;}
  #sidebar.open{left:0;}
  #mob-overlay.show{display:block;}
  #feed{padding:10px 12px;}
  .msg-body,.ai-body{font-size:13px;}
  #input-area{padding:8px 10px;}
  #msg-input{font-size:13px;}
}
</style>
</head>
<body>

<div id="mob-overlay" onclick="closeSidebar()"></div>

<!-- User Modal -->
<div class="overlay" id="user-modal">
  <div class="modal">
    <h2>👋 나는 누구인가요?</h2>
    <p>선택하면 이 기기에서 계속 유지돼요.</p>
    <button class="user-btn" onclick="selectUser('Aron')"><div class="av av-0">A</div>Aron</button>
    <button class="user-btn" onclick="selectUser('Namil')"><div class="av av-1">N</div>Namil</button>
    <button class="user-btn" onclick="selectUser('김형자')"><div class="av av-2">김</div>김형자</button>
    <button class="user-btn" onclick="selectUser('Byungjo')"><div class="av av-3">B</div>Byungjo</button>
    <button class="user-btn" onclick="selectUser('AA')" style="margin-bottom:0"><div class="av av-4">A</div>AA</button>
  </div>
</div>

<!-- New Channel Modal -->
<div class="overlay" id="new-ch-modal">
  <div class="modal">
    <h2>새 프로젝트 채널</h2>

    <div class="modal-btns">
      <button onclick="document.getElementById('new-ch-modal').classList.remove('show')">취소</button>
      <button class="ok" onclick="submitNewCh()">만들기</button>
    </div>
  </div>
</div>

<!-- Join Channel Modal -->
<div class="overlay" id="join-modal">
  <div class="modal">
    <h2>🔒 채널 입장</h2>
    <p>초대 코드를 입력하세요.</p>
    <input type="password" id="join-code" placeholder="초대 코드"/>

    <div class="modal-btns">
      <button onclick="document.getElementById('join-modal').classList.remove('show')">취소</button>
      <button class="ok" onclick="submitJoin()">입장</button>

<div id="header">
  <div style="display:flex;align-items:center;gap:8px;">
    <button id="menu-btn" onclick="toggleSidebar()">☰</button>
    <div class="logo">D</div>
    <span id="app-title">DL팀</span>

<div id="body">
  <div id="sidebar">
    <div class="sb-label">팀 멤버</div>
    <div class="member"><div class="av av-0">A</div>Aron</div>
    <div class="member"><div class="av av-1">N</div>Namil</div>

    <div style="padding:8px 13px;">
      <button onclick="document.getElementById('join-modal').classList.add('show')" style="width:100%;padding:6px;background:transparent;border:1px dashed var(--border2);border-radius:var(--r);color:var(--text3);font-size:11px;cursor:pointer;font-family:'Pretendard',sans-serif;">+ 초대 코드로 채널 입장</button>
    </div>
  </div>

  <div id="main">
    <div id="ch-bar">
      <div><div id="ch-bar-title">채널을 선택하세요</div><div id="ch-bar-sub">프로젝트별로 기록이 분리됩니다</div></div>

<script>
function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('mob-overlay').classList.toggle('show');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('mob-overlay').classList.remove('show');
}
</script>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, push, onValue, remove, set, get } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBDGJs1uPIBu_QI78iUbBS9CYZ569gqadQ",
  authDomain: "team-agent-5b4c3.firebaseapp.com",
  databaseURL: "https://team-agent-5b4c3-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "team-agent-5b4c3",
  storageBucket: "team-agent-5b4c3.firebasestorage.app",
  messagingSenderId: "267688604166",
  appId: "1:267688604166:web:bba0abcfa4913db9bfc987"
};

const MEMBER_STYLE = {
  'Aron':   {cls:'av-0',lbl:'A'},
  'Namil':  {cls:'av-1',lbl:'N'},
  '김형자': {cls:'av-2',lbl:'김'},
  'Byungjo':{cls:'av-3',lbl:'B'},
  'AA':     {cls:'av-4',lbl:'A'}
};
const ICONS = ['📦','🚢','🔍','🔧','🏭','✈️','💡','🤝','📋','🌐'];

let db, currentUser='', activeChId=null, activeSub=null;

// ── SHA256 ──
async function sha256(msg){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// ── Time ──
function fmt(ts){
  const d=new Date(ts);
  return (d.getMonth()+1)+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}

// ── User ──
window.selectUser = function(name){
  currentUser = name;
  const s = MEMBER_STYLE[name]||{cls:'av-0',lbl:'?'};
  const av = document.getElementById('cur-av');
  av.className = 'av '+s.cls;
  av.textContent = s.lbl;
  document.getElementById('cur-name').textContent = name;
  document.getElementById('user-modal').classList.remove('show');
  // Save to Firebase
  if(db) set(ref(db,'users/'+name+'/lastSeen'), Date.now());
  // Load this user's joined channels
  loadJoinedAndRender();
};

function initUser(){
  const saved = localStorage.getItem('dl_user');
  if(saved && MEMBER_STYLE[saved]){
    selectUser(saved);
  } else {
    document.getElementById('user-modal').classList.add('show');
  }
}

// Override selectUser to also save to localStorage
const _origSelect = window.selectUser;
window.selectUser = function(name){
  localStorage.setItem('dl_user', name);
  _origSelect(name);
};

// ── Channels ──
let allChannels = [];

async function loadAllChannels(){
  try{
    const snap = await get(ref(db,'channels'));
    allChannels = snap.exists() ? Object.entries(snap.val()).map(([id,v])=>({id,...v})) : [];
  } catch(e){ allChannels=[]; }
}

async function loadJoinedAndRender(){
  if(!currentUser) return;
  await loadAllChannels();
  // Get joined channels for this user from Firebase
  let joined = [];
  try{
    const snap = await get(ref(db,'joined/'+currentUser));
    joined = snap.exists() ? snap.val() : [];
  } catch(e){
    // Fallback to localStorage
    const saved = localStorage.getItem('joined_'+currentUser);
    joined = saved ? JSON.parse(saved) : [];
  }
  renderChannels(joined);
  // Auto-select first joined channel
  const first = allChannels.find(ch=>joined.includes(ch.id));
  if(first) selectCh(first.id);
}

function renderChannels(joined){
  const list = document.getElementById('ch-list');
  list.innerHTML='';
  const myChannels = allChannels.filter(ch=>joined.includes(ch.id));
  myChannels.forEach(ch=>{
    const d = document.createElement('div');
    d.className='channel'+(activeChId===ch.id?' active':'');
    d.onclick=()=>selectCh(ch.id);
    d.innerHTML=`<span style="font-size:13px">${ch.icon||'📦'}</span><span class="ch-name">${ch.name}</span><span class="ch-del" onclick="delCh(event,'${ch.id}')">✕</span>`;
    list.appendChild(d);
  });
}

async function saveJoined(joined){
  localStorage.setItem('joined_'+currentUser, JSON.stringify(joined));
  if(db && currentUser){
    await set(ref(db,'joined/'+currentUser), joined);
  }
}

async function getJoined(){
  // Always check Firebase first for persistence
  try{
    const snap = await get(ref(db,'joined/'+currentUser));
    if(snap.exists()){
      const j = snap.val();
      localStorage.setItem('joined_'+currentUser, JSON.stringify(j));
      return j;
    }
  }catch(e){}
  const saved = localStorage.getItem('joined_'+currentUser);
  return saved ? JSON.parse(saved) : [];
}

// ── New Channel ──
window.submitNewCh = async function(){
  const name = document.getElementById('nch-name').value.trim();
  const code = document.getElementById('nch-code').value.trim();
  if(!name) return alert('채널 이름을 입력하세요.');
  if(!code) return alert('초대 코드를 설정하세요.');
  const codeHash = await sha256(code);
  const icon = ICONS[Math.floor(Math.random()*ICONS.length)];
  const id = 'ch_'+Date.now();
  // Save channel to Firebase
  await set(ref(db,'channels/'+id), {name, icon, codeHash});
  allChannels.push({id, name, icon, codeHash});
  // Join this channel
  const joined = await getJoined();
  joined.push(id);
  await saveJoined(joined);
  document.getElementById('nch-name').value='';
  document.getElementById('nch-code').value='';
  document.getElementById('new-ch-modal').classList.remove('show');
  renderChannels(joined);
  selectCh(id);
};

// ── Join Channel ──
window.submitJoin = async function(){
  const code = document.getElementById('join-code').value.trim();
  if(!code) return;
  const inputHash = await sha256(code);
  await loadAllChannels();
  const matched = allChannels.find(ch=>ch.codeHash===inputHash);
  if(matched){
    const joined = await getJoined();
    if(!joined.includes(matched.id)) joined.push(matched.id);
    await saveJoined(joined);
    document.getElementById('join-code').value='';
    document.getElementById('join-err').style.display='none';
    document.getElementById('join-modal').classList.remove('show');
    renderChannels(joined);
    selectCh(matched.id);
  } else {
    document.getElementById('join-err').style.display='block';
  }
};

// ── Delete Channel ──
window.delCh = async function(e, id){
  e.stopPropagation();
  if(!confirm('채널을 삭제할까요?')) return;
  await remove(ref(db,'channels/'+id));
  await remove(ref(db,'msgs/'+id));
  allChannels = allChannels.filter(c=>c.id!==id);
  const joined = (await getJoined()).filter(j=>j!==id);
  await saveJoined(joined);
  if(activeChId===id){ activeChId=null; document.getElementById('feed').innerHTML='<div class="empty">← 채널을 선택하거나 새로 만드세요</div>'; }
  renderChannels(joined);
};

// ── Messages ──
function selectCh(id){
  if(window.innerWidth<=600) closeSidebar();
  activeChId=id;
  const ch = allChannels.find(c=>c.id===id);
  document.getElementById('ch-bar-title').textContent = ch ? ch.icon+' '+ch.name : '';
  document.getElementById('ch-bar-sub').textContent = '팀 공유 채널 · 실시간 동기화';
  // Re-render to update active state
  getJoined().then(joined=>renderChannels(joined));
  // Subscribe to messages
  if(activeSub) activeSub();
  activeSub = onValue(ref(db,'msgs/'+id), snap=>{
    const msgs = snap.exists() ? Object.values(snap.val()).sort((a,b)=>a.ts-b.ts) : [];
    renderFeed(msgs);
  });
}

function renderFeed(msgs){
  const feed = document.getElementById('feed');
  const atBottom = feed.scrollHeight-feed.scrollTop<=feed.clientHeight+60;
  if(!msgs.length){ feed.innerHTML='<div class="empty">아직 기록이 없어요.<br>첫 번째 기록을 남겨보세요!</div>'; return; }
  feed.innerHTML='';
  msgs.forEach(m=>{
    const isAI = m.author==='AI';
    const s = MEMBER_STYLE[m.author]||{cls:'av-0',lbl:'?'};
    const d = document.createElement('div');
    d.className='msg';
    d.innerHTML=`<div class="msg-av ${isAI?'av-0':''}${s.cls}" style="${isAI?'background:#dde8ff;color:#2a5cd4;':''}">${isAI?'AI':s.lbl}</div><div class="msg-r"><div class="msg-meta"><span class="msg-name">${m.author}</span><span class="msg-time">${fmt(m.ts)}</span></div><div class="${isAI?'ai-body':'msg-body'}">${m.text}</div></div>`;
    feed.appendChild(d);
  });
  if(atBottom) feed.scrollTop=feed.scrollHeight;
}

window.sendMsg = async function(){
  if(!activeChId) return alert('채널을 먼저 선택하세요.');
  const inp = document.getElementById('msg-input');
  const text = inp.value.trim();
  if(!text) return;
  await push(ref(db,'msgs/'+activeChId), {author:currentUser, text, ts:Date.now()});
  inp.value='';
};

window.askAI = async function(){
  if(!activeChId) return alert('채널을 먼저 선택하세요.');
  const inp = document.getElementById('ai-input');
  const q = inp.value.trim();
  if(!q) return;
  const btn = document.getElementById('ai-btn');
  btn.disabled=true; btn.textContent='생각 중...'; inp.value='';
  const feed = document.getElementById('feed');
  const ld = document.createElement('div');
  ld.className='msg'; ld.id='ai-ld';
  ld.innerHTML=`<div class="msg-av" style="background:#dde8ff;color:#2a5cd4;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0;">AI</div><div class="msg-r"><div class="msg-meta"><span class="msg-name">AI</span></div><div class="ai-body"><div class="dots"><span></span><span></span><span></span></div></div></div>`;
  feed.appendChild(ld); feed.scrollTop=feed.scrollHeight;
  const ch = allChannels.find(c=>c.id===activeChId);
  const snap = await get(ref(db,'msgs/'+activeChId));
  const ctx = snap.exists() ? Object.values(snap.val()).sort((a,b)=>a.ts-b.ts).slice(-30).map(m=>`[${m.author}] ${m.text}`).join('\n') : '기록 없음';
  try{
    const res = await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:`당신은 DL팀의 AI 에이전트입니다. 현재 채널: "${ch?.name}". 팀 기록을 바탕으로 질문에 한국어로 간결하게 답하세요.\n\n팀 기록:\n${ctx}`,
        messages:[{role:'user',content:q}]
      })
    });
    const data = await res.json();
    const answer = data.content?.[0]?.text||'답변을 가져오지 못했어요.';
    document.getElementById('ai-ld')?.remove();
    await push(ref(db,'msgs/'+activeChId), {author:'AI', text:`Q: ${q}\n\n${answer}`, ts:Date.now()});
  }catch(e){
    document.getElementById('ai-ld')?.remove();
    alert('AI 오류: '+e.message);
  }
  btn.disabled=false; btn.textContent='AI 답변 ↗';
};

// ── Init ──
document.getElementById('msg-input').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();window.sendMsg();}});
document.getElementById('ai-input').addEventListener('keydown',e=>{if(e.key==='Enter')window.askAI();});

const app = initializeApp(FIREBASE_CONFIG);
db = getDatabase(app);
document.getElementById('live-dot').classList.add('pulse');
document.getElementById('sync-txt').textContent='실시간 동기화';
initUser();

if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
</script>
</body>
</html>
